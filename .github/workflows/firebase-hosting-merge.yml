# https://github.com/firebase/firebase-tools

name: Deploy to Firebase Hosting on merge
on:
  push:
    branches:
      - main
jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build functions
        run: |
             npm install
             npm run build
        working-directory: ./functions
      - name: Build client
        run: |
             npm install
             export NODE_OPTIONS=--max-old-space-size=4096 && npm run build
        working-directory: ./client
      - name: Add DLLM-Adminsdk
        run: |
             echo '${{secrets.DLLM_ADMINSDK}}' > dllm-libray-firebase-adminsdk.json
        working-directory: ./functions/dist
      - name: Test functions
        run: |
             echo '${{secrets.DLLM_ADMINSDK}}' > src/dllm-libray-firebase-adminsdk.json
             npm run test
        working-directory: ./functions
      - name: My deploy to Firebase
        run: |
             npm install firebase-tools
             export NODE_OPTIONS=--max-old-space-size=5120 && npx firebase deploy --token ${{ secrets.FIREBASE_TOKEN }}
   


