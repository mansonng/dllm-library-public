scalar Date
scalar Void

# 基本類型定義
enum Language {
  ZH_HK # 繁體中文
  EN # 英文
}

enum ItemCondition {
  NEW
  GOOD
  FAIR
  POOR
  LIKE_NEW
}

enum ContactMethodType {
  WHATSAPP
  SIGNAL
  TELEGRAM
  EMAIL
}

enum ItemStatus {
  AVAILABLE # 可借閱
  EXCHANGEABLE # 可交換
  GIFT # 可贈送
  RESERVED # 已預留
  TRANSFERRED # 已轉讓
}

# 地點類型
type Location {
  latitude: Float!
  longitude: Float!
  geohash: String
}

enum Role {
  USER
  ADMIN
  MODERATOR
  EXCHANGE_POINT_ADMIN # 交換點管理員
}

type Category {
  category: String!
  count: Int!
}

type CategoryMap {
  language: String!
  value: String!
}

input CategoryMapInput {
  language: String!
  value: String!
}

type ItemConfig {
  defaultCategoryTrees: [String!]! # e.g. ["Fiction/Science Fiction", "Fiction/History", "Fiction/Fantasy", "Non-Fiction/History"]
  categoryMaps: [[CategoryMap!]!]!
}

type HostConfig {
  chatLink: String!
  aboutUsText: String!
}

enum RecommendationType {
  USER_PICKED
  NEW_ARRIVALS
  POPULAR
  ADMIN_PICKED
}

# 用戶個人檔案
type User {
  id: ID!
  email: String! # 唯一必填，加密儲存
  nickname: String # 可選暱稱
  location: Location # 可選經緯度，用於搜尋
  address: String # 可選地區，如 "London, UK"
  role: Role! # 用戶角色
  isActive: Boolean! # 是否啟用帳號
  isVerified: Boolean! # 是否已驗證電子郵件
  contactMethods: [ContactMethod!] # 其他聯繫方式
  exchangePoints: [String!] # 可選的交換點
  itemCategory: [Category!]
  pinItems: [Item!] # 用戶置頂的藏品 Max 5個
  createdAt: Date!
}

type ContactMethod {
  type: ContactMethodType!
  value: String! # 聯繫方式詳情
  isPublic: Boolean! # 是否公開
}

# 藏品
type Item {
  id: ID!
  ownerId: ID! # 藏品擁有者
  holderId: ID # 當前持有者（可為null，表示擁有者持有）
  name: String! # 書名或物品名稱
  description: String # 可選描述
  condition: ItemCondition!
  category: [String!]! # 分類標籤，如 ["小說", "香港歷史"]
  status: ItemStatus!
  deposit: Int # 押金（如適用）
  images: [String!] # 圖片URL列表
  thumbnails: [String!] # 縮略圖URL列表
  publishedYear: Int # 可選出版年份
  language: Language! # 主要語言
  location: Location # 藏品所在地（繼承自擁有者）
  createdAt: Date!
  updatedAt: Date!
  clssfctns: [String!] # Classifications 分類標籤 with ordering assigned by admin
}

interface ItemCommentBase {
  content: String!
  createdAt: Date!
  updatedAt: Date!
}

# This is for querying ItemComments by Item
type ItemComment implements ItemCommentBase {
  id: ID!
  userId: ID!
  userNickname: String!

  # Content from interface
  content: String!
  createdAt: Date!
  updatedAt: Date!
}

type ItemCommentByUser implements ItemCommentBase {
  itemId: ID!
  commentId: ID!

  # Content from interface
  content: String!
  createdAt: Date!
  updatedAt: Date!
}

# Connection object for item comments for pagination.
type ItemCommentsConnection {
  comments: [ItemComment]
  pageInfo: ItemCommentPageInfo
}

type ItemCommentPageInfo {
  startCursor: ID
  endCursor: ID
  hasNextPage: Boolean!
}

type ItemCommentsByUserConnection {
  comments: [ItemCommentByUser]
  pageInfo: ItemCommentPageInfo
}

type NewsPost {
  id: ID!
  title: String!
  content: String!
  images: [String!] # 圖片URL列表
  relatedItems: [Item!] # 相關藏品
  createdAt: Date!
  updatedAt: Date!
  isVisible: Boolean! # 是否公開顯示
  user: User! # 發布者
  tags: [String!] # 標籤列表
}

# 虛擬所有權轉移
type Transaction {
  id: ID!
  item: Item!
  requestor: User!
  receiver: User # 最終接收者
  location: Location # 交易地點
  status: TransactionStatus!
  details: String # 可選交易詳情 如 "Deposit amount or special notes in JSON format"
  images: [String!] # 圖片URL列表
  thumbnails: [String!] # 縮略圖URL列表
  createdAt: Date!
  updatedAt: Date!
  expireAt: Date # 交易過期時間
}

enum TransactionStatus {
  PENDING # 申請中
  APPROVED # 已確認
  TRANSFERED # 已轉讓
  COMPLETED # 已完成
  CANCELLED # 已取消
  EXPIRED # 已過期
}

enum TransactionLocation {
  HOLDER_LOCATION
  HOLDER_PUBLIC_EXCHANGE_POINT
  REQUESTOR_PUBLIC_EXCHANGE_POINT
  REQUESTOR_LOCATION
  FACE_TO_FACE
}

type SignedUrlResponse {
  signedUrl: String!
  gsUrl: String!
  expires: Float!
}

enum BindType {
  ITEM
  BINDER
}

type Bind {
  type: BindType!
  id: ID! # Item ID or Binder ID
  name: String! # Item name or Binder name for preview
}

type Binder {
  id: ID! # User's root binder same as User ID
  name: String!
  description: String
  owner: User!
  images: [String!] # 圖片URL列表
  thumbnails: [String!] # 縮略圖URL列表
  binds: [Bind!]! # List of bound items
  bindedCount: Int! # Number of times this binder is binded in other binders
  updatedAt: Date!
}

type BinderPath {
  id: ID! # Binder ID
  path: String! # Binder Path with names and separate by / e.g. "Root Binder/Sub Binder 1/Sub Binder 2"
}

# 查詢
type Query {
  # 主機配置
  hostConfig: HostConfig!
  # 用戶相關
  user(id: ID!): User
  me: User # 當前登錄用戶
  users(address: String, limit: Int, offset: Int): [User!]! # 按地區查找（備用）
  exchangePoints(limit: Int, offset: Int): [User!]! # 交換點列表
  exchangePointsCount: Int! # 交換點總數
  # 藏品相關
  item(id: ID!): Item
  items(
    classifications: [String!]
    address: String # 備用字段
    status: ItemStatus
    keyword: String
    limit: Int
    offset: Int
  ): [Item!]! # 按條件篩選藏品（舊方式）
  totalItemsCount(
    classifications: [String!]
    address: String # 備用字段
    status: ItemStatus
    keyword: String
  ): Int! # 符合條件的藏品總數
  recommendedItems(
    type: RecommendationType!
    category: String
    limit: Int
  ): [Item!]! # 推薦藏品
  itemsByLocation(
    latitude: Float!
    longitude: Float!
    radiusKm: Float! # 搜尋半徑（公里）
    classifications: [String!]
    category: [String!]
    status: ItemStatus
    keyword: String
    limit: Int
    offset: Int
  ): [Item!]! # 基於當前位置的搜尋
  #
  # Keep this implementation separate until it is ready.
  #
  itemsByKeywordExperimental(keyword: String): [Item!]!
  totalItemsCountByLocation(
    latitude: Float!
    longitude: Float!
    radiusKm: Float! # 搜尋半徑（公里）
    classifications: [String!]
    category: [String!]
    status: ItemStatus
    keyword: String
  ): Int! # 基於當前位置的藏品總數
  itemsByUser(
    userId: ID!
    category: [String!]
    status: ItemStatus
    keyword: String
    limit: Int
    offset: Int
    isExchangePointItem: Boolean
  ): [Item!]! # 基於User的搜尋
  totalItemsCountByUser(
    userId: ID!
    category: [String!]
    status: ItemStatus
    keyword: String
    isExchangePointItem: Boolean
  ): Int! # 基於User的藏品總數
  itemsOnLoanByUser(
    userId: ID!
    category: [String!]
    status: ItemStatus
    keyword: String
    limit: Int
    offset: Int
  ): [Item!]! # 查詢用戶借出的藏品
  itemsOnLoanByOwner(
    userId: ID!
    category: [String!]
    status: ItemStatus
    keyword: String
    limit: Int
    offset: Int
  ): [Item!]!
  itemsOnLoanByHolder(
    userId: ID!
    category: [String!]
    status: ItemStatus
    keyword: String
    limit: Int
    offset: Int
  ): [Item!]! # 查詢用戶借入的藏品
  recentAddedItems(limit: Int, offset: Int, category: [String!]): [Item!]! # 最近新增的藏品
  # 交易相關
  transaction(id: ID!): Transaction
  transactionsByItem(itemId: ID!): [Transaction!]! # 按藏品ID查詢交易
  openTransactionsByItem(itemId: ID!): [Transaction!]! # 按藏品ID查詢開放交易
  openTransactionsByUser(userId: ID!): [Transaction!]! # 按用戶ID查詢交易
  transactionsByUser(userId: ID!): [Transaction!]! # 按用戶ID查詢交易
  transactions(userId: ID, itemId: ID): [Transaction!]!

  # 新聞相關
  newsPost(id: ID!): NewsPost
  newsRecentPosts(
    keyword: String
    tags: [String!]
    limit: Int
    offset: Int
  ): [NewsPost!]! # 按關鍵字和標籤搜尋新聞
  # 地理編碼相關
  geocodeAddress(address: String!): Location

  # 分類相關
  recentUpdateCategories(limit: Int): [String!]! # 最近更新的分類列表
  hotCategories(limit: Int): [String!]! # 熱門分類列表
  defaultCategories: [String!]! # 預設分類列表
  # Query comments by itemId
  # first - the number of comments to return.
  # startAfterId, startAfterDate - Key used in pagination to figure out the next item.
  commentsByItemId(
    itemId: ID!
    first: Int!
    startAfterId: ID
    startAfterDate: Date
  ): ItemCommentsConnection!

  # Query comments by itemId
  # first - the number of comments to return.
  # startAfterId, startAfterDate - Key used in pagination to figure out the next item.
  commentsByUserId(
    userId: ID!
    first: Int!
    startAfterId: ID
    startAfterDate: Date
  ): ItemCommentsByUserConnection!

  # Get Item Configurations to build category selection UI
  itemConfig: ItemConfig!

  # Get recent items without classifications assigned for admin review
  recentItemsWithoutClassifications(limit: Int): [Item!]

  # Get Binder by ID
  binder(Id: ID!): Binder

  # Get all Binder Paths for User
  binderPathsByUser(userId: ID!): [BinderPath!]!
}

# 變更
type Mutation {
  # 主機配置管理
  updateHostConfig(input: HostConfigInput!): HostConfig!
  # 用戶管理
  createUser(email: String!, address: String, nickname: String): User!
  updateUser(
    nickname: String
    address: String
    contactMethods: [ContactMethodInput!]
    exchangePoints: [String!]
  ): User!
  deleteUser(id: ID!): Boolean!

  # 藏品管理
  createItem(
    name: String!
    description: String
    condition: ItemCondition!
    category: [String!]!
    status: ItemStatus!
    images: [String!]
    publishedYear: Int
    language: Language!
    deposit: Int! = 0
  ): Item!
  updateItem(
    id: ID!
    name: String
    description: String
    condition: ItemCondition
    category: [String!]
    status: ItemStatus
    images: [String!]
    publishedYear: Int
    deposit: Int
    language: Language
    classifications: [String!]
  ): Item!
  deleteItem(id: ID!): Boolean!
  pinItem(itemId: ID!): Boolean!
  unpinItem(itemId: ID!): Boolean!

  addItemComment(itemId: ID!, content: String!): ID!
  deleteItemComment(itemId: ID!, commentId: ID!): Boolean!
  editItemComment(itemId: ID!, commentId: ID!, content: String!): Boolean!

  # 交易管理
  createTransaction(
    itemId: ID!
    location: TransactionLocation! = HOLDER_LOCATION
    locationIndex: Int! = 0
    details: String
  ): Transaction!
  # 快速創建交易 By Holder
  # 使用預設位置選項 FACE_TO_FACE
  # 只需提供 itemId 即可
  # 此交易將直接進入 TRANSFERED 狀態
  createQuickTransaction(itemId: ID!, details: String): Transaction!
  approveTransaction(id: ID!): Transaction!
  transferTransaction(id: ID!): Transaction!
  receiveTransaction(id: ID!, images: [String!]): Transaction!
  cancelTransaction(id: ID!): Boolean!

  # 新聞管理 Only for Admin/Moderator
  createNewsPost(
    title: String!
    content: String!
    images: [String!]
    relatedItemIds: [ID!]
    tags: [String!]
  ): NewsPost!
  updateNewsPost(
    id: ID!
    title: String
    content: String
    images: [String!]
    relatedItemIds: [ID!]
    tags: [String!]
  ): NewsPost!
  hideNewsPost(id: ID!): Boolean!

  upsertCategoryMap(
    en: String!
    categoryMaps: [CategoryMapInput!]!
  ): [CategoryMap!]

  addCategoryTree(parentPath: String, leafCategory: String!): String!

  deleteCategoryTree(categoryPath: String!): Boolean!

  generateSignedUrl(
    fileName: String!
    contentType: String!
    folder: String
  ): SignedUrlResponse!

  generateItemIndexIncremental: Boolean!

  addBindToBinder(
    parentId: ID!
    newBinderName: String # if newBinderName is provided, a new Binder bind to Binder
    bind: BindInput!
    beforeBindId: ID # Item ID or Binder ID to insert before, null to append at the end
  ): Binder!

  updateBinder(
    id: ID!
    name: String
    description: String
    images: [String!]
    bindIds: [ID!] # List of Item IDs or Binder IDs for re-arranging
  ): Binder!

  moveBind(
    originalBinderId: ID!
    bindId: ID! # Item ID or Binder ID
    targetBinderId: ID # if targetBinderId is null, remove from original binder
    beforeBindId: ID # Item ID or Binder ID to insert before, null to append at the end
  ): Binder!
}

# 輸入類型
input LocationInput {
  latitude: Float!
  longitude: Float!
}

input BindInput {
  type: BindType!
  id: ID! # Item ID or Binder ID
  name: String! # Item name or Binder name for preview
}

input ContactMethodInput {
  type: String!
  value: String!
  isPublic: Boolean!
}

input HostConfigInput {
  chatLink: String!
  aboutUsText: String!
}
